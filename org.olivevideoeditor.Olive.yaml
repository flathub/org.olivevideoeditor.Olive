app-id: org.olivevideoeditor.Olive
default-branch: beta
desktop-file-name-suffix: ' (Beta)'
runtime: org.kde.Platform
sdk: org.kde.Sdk
runtime-version: '5.15-25.08'
command: olive-editor
rename-mime-icons:
  - application-vnd.olive-project
finish-args:
  - --socket=x11
  - --share=ipc
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=host
cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /lib/*.a
  - /lib/*.la
  - /share/cmake
modules:
  - name: boost
    buildsystem: simple
    sources:
      - type: archive
        url: https://sourceforge.net/projects/boost/files/boost/1.80.0/boost_1_80_0.tar.bz2
        sha256: 1e19565d82e43bc59209a168f5ac899d3ba471d55c7610c677d4ccf2c9c500c0
    build-commands:
      - "./bootstrap.sh --prefix=/app --with-libraries=system,filesystem,thread,wave"
      - "./b2 install variant=release link=shared runtime-link=shared -j $FLATPAK_BUILDER_N_JOBS"

  - name: imath
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    sources:
      - type: archive
        url: https://github.com/AcademySoftwareFoundation/Imath/archive/refs/tags/v3.1.5.tar.gz
        sha256: 1e9c7c94797cf7b7e61908aed1f80a331088cc7d8873318f70376e4aed5f25fb
        x-checker-data:
          type: anitya
          project-id: 223366
          stable-only: true
          url-template: https://github.com/AcademySoftwareFoundation/Imath/archive/refs/tags/v$version.tar.gz

  - name: openexr
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    cleanup:
      - /bin
      - /share/doc
    sources:
      - type: git
        url: https://github.com/AcademySoftwareFoundation/openexr.git
        commit: fad1d1a9dc188aceabbea1313580d73b7236b79b
        tag: v3.1.13

  - name: fmtlib
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DFMT_TEST=OFF
    sources:
      - type: git
        url: https://github.com/fmtlib/fmt.git
        commit: 7bdf0628b1276379886c7f6dda2cef2b3b374f0b
        tag: '7.1.3'

  - name: robin-map
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    sources:
      - type: git
        url: https://github.com/Tessil/robin-map.git
        commit: 622443f40544fb6a693402e69c1328d685eac939
        tag: v0.6.3

  # For opencolorio
  - name: yaml-cpp
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCMAKE_POSITION_INDEPENDENT_CODE=ON
      - -DYAML_CPP_BUILD_TESTS=OFF
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    sources:
      - type: git
        url: https://github.com/jbeder/yaml-cpp.git
        commit: 9a3624205e8774953ef18f57067b3426c1c5ada6
        tag: yaml-cpp-0.6.3
  - name: pystring
    buildsystem: simple
    build-commands:
      - sed -e 's|/usr|/app|g' -i Makefile
      - make -j $FLATPAK_BUILDER_N_JOBS install
      - install -Dm644 pystring.h -t /app/include/pystring
    sources:
      - type: git
        url: https://github.com/imageworks/pystring.git
        commit: c2de99deb4f0bd13751f8436400b5e8662301769
        tag: v1.1.3

  - name: OpenColorIO
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DOCIO_BUILD_STATIC=OFF
      - -DOCIO_BUILD_APPS=OFF
      - -DOCIO_BUILD_TESTS=OFF
      - -DOCIO_BUILD_GPU_TESTS=OFF
      - -DOCIO_BUILD_PYTHON=OFF
    build-options:
      arch:
        aarch64:
          config-opts:
            - -DOCIO_USE_SSE=NO
    cleanup:
      - /bin
    sources:
      - type: git
        url: https://github.com/AcademySoftwareFoundation/OpenColorIO.git
        commit: 66b7b7d58f2ca587ae45fc71aa8bb2157145ac35
        tag: v2.1.3
      - type: patch
        path: patches/opencolorio-gcc.patch

  - name: 'x264'
    config-opts:
      - --disable-cli
      - --enable-shared
    sources:
      - type: archive
        url: https://download.videolan.org/x264/snapshots/x264-snapshot-20190305-2245-stable.tar.bz2
        sha256: be52c96ef8bd930fbc1ecff03abac9b94976b444ea7641345e08e20d9e594d16

  - name: 'x265'
    buildsystem: cmake-ninja
    builddir: true
    subdir: source
    config-opts:
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DENABLE_CLI=OFF
    sources:
      - type: archive
        url: https://deb.debian.org/debian/pool/main/x/x265/x265_3.4.orig.tar.gz
        sha256: c2047f23a6b729e5c70280d23223cb61b57bfe4ad4e8f1471eeee2a61d148672
      - type: patch
        path: patches/x265-cmake.patch

  - name: ffmpeg
    config-opts:
      - --disable-static
      - --enable-shared
      - --disable-debug
      - --disable-doc
      - --enable-gpl
      - --disable-programs
      - --enable-libopus
      - --enable-libvpx
      - --enable-librsvg
      - --enable-libx264
      - --enable-libx265
      - --enable-libmp3lame
    cleanup:
      - /share/ffmpeg/examples
    sources:
      - type: archive
        url: https://www.ffmpeg.org/releases/ffmpeg-4.2.4.tar.xz
        sha256: 0d5da81feba073ee78e0f18e0966bcaf91464ae75e18e9a0135186249e3d2a0b
      - type: patch
        path: patches/ffmpeg-as-fix.patch

  - name: OpenImageIO
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DVERBOSE=ON
      - -DOIIO_BUILD_TOOLS=OFF
      - -DOIIO_BUILD_TESTS=OFF
      - -DBUILD_DOCS=OFF
      - -DUSE_PYTHON=OFF
    sources:
      - type: git
        url: https://github.com/OpenImageIO/oiio.git
        commit: f32bf6e6f8de38ab6d197a72fd72366b66fd30a3
        tag: v2.5.19.1

  - name: portaudio
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    sources:
      - type: archive
        url: https://github.com/PortAudio/portaudio/archive/refs/tags/v19.7.0.tar.gz
        sha256: 5af29ba58bbdbb7bbcefaaecc77ec8fc413f0db6f4c4e286c40c3e1b83174fa0

  - name: OpenTimelineIO
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCMAKE_CXX_STANDARD=17
      - -DOTIO_PYTHON_INSTALL=OFF
    sources:
      - type: git
        url: https://github.com/AcademySoftwareFoundation/OpenTimelineIO.git
        commit: 8cdda64f5ef924855ce503822e1aeb125e6b011e
        tag: v0.14.1
      - type: patch
        path: patches/opentimelineio-gcc.patch

  - name: olive
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      # All of these are to pick the build version instead of the
      # one in the runtime.
      - -DFFMPEG_avutil_INCLUDE_DIR=/app/include
      - -DFFMPEG_avutil_LIBRARY=/app/lib/libavutil.so
      - -DFFMPEG_avcodec_LIBRARY=/app/lib/libavcodec.so
      - -DFFMPEG_avfilter_LIBRARY=/app/lib/libavfilter.so
      - -DFFMPEG_avformat_LIBRARY=/app/lib/libavformat.so
      - -DFFMPEG_swresample_INCLUDE_DIR=/app/include
      - -DFFMPEG_swresample_LIBRARY=/app/lib/libswresample.so
      - -DFFMPEG_swscale_LIBRARY=/app/lib/libswscale.so
      - -DUSE_WERROR=OFF
    sources:
      - type: git
        url: https://github.com/olive-editor/olive.git
        commit: 55d3915881b36161db6240d7e3ad7decc4730337
        # 7e0e94abf6610026aebb9ddce8564c39522fac6e
      - type: patch
        paths:
          - patches/olive-gl.patch
          - patches/olive-metainfo.patch
